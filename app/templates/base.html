<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Spec Compliance Checker{% endblock %}</title>
  <style>
    :root {
      --ink: #14181f;
      --muted: #5b6675;
      --line: #e3e7ec;
      --bg: #f7f8fa;
      --accent: #1f5fbf;
      --warn-bg: #fff6e6;
      --warn-line: #e6c982;
      --warn-ink: #7a5800;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    main { flex: 1; width: 100%; max-width: 760px; margin: 0 auto; padding: 4rem 1.5rem; }
    footer {
      border-top: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 1.25rem 1.5rem;
      text-align: center;
    }
    a { color: var(--accent); }
    .disclaimer { color: var(--warn-ink); }
    {% block style %}{% endblock %}
  </style>
</head>
<body>
  <main>{% block content %}{% endblock %}</main>
  <footer>
    <p class="disclaimer">
      Illustrative tool on synthetic documents — not a quality system of record.
      A qualified engineer signs every disposition.
    </p>
  </footer>
</body>
</html>
